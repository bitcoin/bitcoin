# PR benchmark configuration with assumevalid=0 (full script verification)
# Measures validation/script verification performance ("what it's like at tip")
#
# Usage:
#   bench.py run --benchmark-config bench/configs/pr-noassumevalid.toml --matrix-entry 450-uninstrumented \
#     --datadir /data/pruned-840k --output-dir ./output \
#     pr:/path/to/pr/bitcoind

[benchmark]
start_height = 840000
runs = 2

[bitcoind]
stopatheight = 900000
chain = "main"
connect = "148.251.128.115:33333"
prune = 1000000
daemon = false
printtoconsole = false
assumevalid = "0"

# Parameter matrix - creates multiple benchmark configurations
# Matrix expands to: 450-uninstrumented, 32000-uninstrumented
[bitcoind.matrix]
dbcache = [450, 32000]
instrumentation = ["uninstrumented"]
