name: 'Setup Secure Environment'
description: 'Configure secure environment with proper key management and secrets handling'
inputs:
  enable-gpg:
    description: 'Enable GPG key configuration'
    required: false
    default: 'false'
  cleanup-after:
    description: 'Clean up secrets after job completion'
    required: false
    default: 'true'
outputs:
  status:
    description: 'Setup status'
    value: ${{ steps.setup.outputs.status }}
runs:
  using: 'composite'
  steps:
    - name: Validate environment security
      shell: bash
      run: |
        echo "::group::Environment Security Validation"
        
        # Check that we're not exposing secrets
        echo "Validating environment variables..."
        
        # List environment variables (without values) to ensure no secrets in names
        printenv | cut -d= -f1 | sort
        
        # Ensure critical security variables are not set to unsafe values
        if [ "${RUNNER_DEBUG}" == "1" ]; then
          echo "::warning::Debug mode is enabled - secrets may be exposed in logs"
        fi
        
        echo "✓ Environment validation complete"
        echo "::endgroup::"

    - name: Setup secure temporary directory
      shell: bash
      run: |
        echo "::group::Secure Temporary Directory"
        
        # Create secure temporary directory
        SECURE_TMP=$(mktemp -d -t github-secure-XXXXXXXX)
        chmod 700 "$SECURE_TMP"
        echo "SECURE_TMP_DIR=$SECURE_TMP" >> $GITHUB_ENV
        
        echo "Created secure temporary directory: $SECURE_TMP"
        echo "Permissions: $(stat -c %a $SECURE_TMP 2>/dev/null || stat -f %A $SECURE_TMP)"
        
        echo "::endgroup::"

    - name: Configure GPG (if enabled)
      if: inputs.enable-gpg == 'true'
      shell: bash
      run: |
        echo "::group::GPG Configuration"
        
        if command -v gpg &> /dev/null; then
          # Configure GPG for secure operations
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          
          # Create GPG configuration for non-interactive use
          cat > ~/.gnupg/gpg.conf << 'EOF'
        # GPG Configuration for CI/CD
        # Use secure defaults
        personal-digest-preferences SHA512 SHA384 SHA256
        personal-cipher-preferences AES256 AES192 AES
        personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
        default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed
        cert-digest-algo SHA512
        s2k-digest-algo SHA512
        s2k-cipher-algo AES256
        charset utf-8
        no-comments
        no-emit-version
        keyid-format 0xlong
        with-fingerprint
        list-options show-uid-validity
        verify-options show-uid-validity
        EOF
          
          echo "✓ GPG configured with secure defaults"
        else
          echo "::notice::GPG not available"
        fi
        
        echo "::endgroup::"

    - name: Setup SSH security
      shell: bash
      run: |
        echo "::group::SSH Security"
        
        # Ensure SSH directory has correct permissions
        if [ -d ~/.ssh ]; then
          chmod 700 ~/.ssh
          find ~/.ssh -type f -exec chmod 600 {} \;
          echo "✓ SSH permissions secured"
        fi
        
        # Create SSH config with security settings
        mkdir -p ~/.ssh
        cat >> ~/.ssh/config << 'EOF'
        
        # Security settings for CI/CD
        Host *
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
            IdentitiesOnly yes
            PasswordAuthentication no
            ChallengeResponseAuthentication no
            PubkeyAuthentication yes
        EOF
        
        chmod 600 ~/.ssh/config
        echo "✓ SSH security configured"
        
        echo "::endgroup::"

    - name: Setup secure file handling
      shell: bash
      run: |
        echo "::group::Secure File Handling"
        
        # Set secure umask for file creation
        umask 077
        echo "UMASK set to 077 for secure file creation"
        
        # Create function for secure file operations (available to subsequent steps)
        cat > "${SECURE_TMP_DIR}/secure_ops.sh" << 'EOF'
        #!/bin/bash
        # Secure file operations helper
        
        secure_write() {
          local file="$1"
          local content="$2"
          
          # Create file with secure permissions
          touch "$file"
          chmod 600 "$file"
          echo "$content" > "$file"
        }
        
        secure_delete() {
          local file="$1"
          
          # Overwrite file before deletion
          if [ -f "$file" ]; then
            shred -vfz -n 3 "$file" 2>/dev/null || rm -f "$file"
          fi
        }
        
        export -f secure_write secure_delete
        EOF
        
        chmod 700 "${SECURE_TMP_DIR}/secure_ops.sh"
        echo "SECURE_OPS=${SECURE_TMP_DIR}/secure_ops.sh" >> $GITHUB_ENV
        
        echo "✓ Secure file handling configured"
        echo "::endgroup::"

    - name: Setup secret detection
      shell: bash
      run: |
        echo "::group::Secret Detection Setup"
        
        # Create pre-commit hook style checker for secrets
        cat > "${SECURE_TMP_DIR}/check_secrets.sh" << 'EOF'
        #!/bin/bash
        # Check for potential secrets in files
        
        SECRET_PATTERNS=(
          'AKIA[0-9A-Z]{16}'                    # AWS Access Key
          'ghp_[a-zA-Z0-9]{36}'                 # GitHub Token
          'gho_[a-zA-Z0-9]{36}'                 # GitHub OAuth Token
          'sk_live_[0-9a-zA-Z]{24,}'            # Stripe Live Key
          'pk_live_[0-9a-zA-Z]{24,}'            # Stripe Publishable Key
          'AIza[0-9A-Za-z_-]{35}'               # Google API Key
          '[0-9]+-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com'  # Google OAuth
        )
        
        check_file() {
          local file="$1"
          local found=0
          
          for pattern in "${SECRET_PATTERNS[@]}"; do
            if grep -qE "$pattern" "$file" 2>/dev/null; then
              echo "WARNING: Potential secret found in $file"
              found=1
            fi
          done
          
          return $found
        }
        
        export -f check_file
        EOF
        
        chmod 700 "${SECURE_TMP_DIR}/check_secrets.sh"
        echo "SECRET_CHECKER=${SECURE_TMP_DIR}/check_secrets.sh" >> $GITHUB_ENV
        
        echo "✓ Secret detection configured"
        echo "::endgroup::"

    - name: Complete setup
      id: setup
      shell: bash
      run: |
        echo "status=success" >> $GITHUB_OUTPUT
        
        cat >> $GITHUB_STEP_SUMMARY << EOF
        ### Secure Environment Setup Complete
        
        ✓ Environment security validated
        ✓ Secure temporary directory created
        $([ "${{ inputs.enable-gpg }}" == "true" ] && echo "✓ GPG configured" || echo "- GPG skipped")
        ✓ SSH security configured
        ✓ Secure file handling enabled
        ✓ Secret detection active
        
        **Secure Temp Dir**: \`$SECURE_TMP_DIR\`
        **Cleanup After**: ${{ inputs.cleanup-after }}
        EOF

    - name: Register cleanup handler
      if: inputs.cleanup-after == 'true'
      shell: bash
      run: |
        echo "::group::Cleanup Registration"
        
        # Note: Actual cleanup happens in a separate step at job end
        # This just registers the intention
        echo "Cleanup will be performed after job completion"
        
        echo "::endgroup::"
