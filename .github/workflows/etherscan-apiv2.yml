name: Etherscan API Integration (kushmanmb.eth)

on:
  workflow_dispatch:
    inputs:
      api_endpoint:
        description: 'Etherscan API endpoint to query'
        required: false
        default: 'account'
        type: choice
        options:
          - account
          - transaction
          - contract
          - ens_resolve
          - verify_proxy
          - eth_blockNumber
      chain_id:
        description: 'Chain ID (1=Ethereum, 8453=Base)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '8453'
      ens_name:
        description: 'ENS name to resolve (default: kushmanmb.eth)'
        required: false
        default: 'kushmanmb.eth'
        type: string
      contract_address:
        description: 'Contract address (for verify_proxy endpoint)'
        required: false
        type: string
      implementation_address:
        description: 'Expected implementation address (for verify_proxy)'
        required: false
        type: string
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/etherscan-apiv2.yml'

# Explicitly grant write permissions for the workflow
# to commit back to the repository
permissions:
  contents: write

concurrency:
  group: etherscan-apiv2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch-etherscan-data:
    name: 'Fetch data from Etherscan API'
    # Using self-hosted runner when available for kushmanmb.eth repository
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup environment
        run: |
          echo "WORKFLOW_RUN_TIME=$(date -u +%Y-%m-%d-%H-%M-%S)" >> $GITHUB_ENV

      - name: Validate configuration
        run: |
          echo "Validating configuration..."
          
          # Check if ETHERSCAN_API_KEY is configured
          if [ -z "${{ secrets.ETHERSCAN_API_KEY }}" ]; then
            echo "⚠️ Warning: ETHERSCAN_API_KEY not configured"
            echo "Please add your Etherscan API key to repository secrets"
            echo "Get one at: https://etherscan.io/myapikey"
          fi
          
          echo "✓ Configuration validation complete"

      - name: Resolve ENS name to address
        id: resolve-ens
        env:
          ENS_NAME_INPUT: ${{ github.event.inputs.ens_name || 'kushmanmb.eth' }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          CHAIN_ID: ${{ github.event.inputs.chain_id || '1' }}
        run: |
          echo "Resolving ENS name: ${ENS_NAME_INPUT}"
          echo "Chain ID: ${CHAIN_ID}"
          mkdir -p data/etherscan
          
          # Store chain ID for use in later steps
          echo "CHAIN_ID=${CHAIN_ID}" >> $GITHUB_ENV
          
          # ENS resolution only works on Ethereum mainnet (chainid=1)
          if [ "${CHAIN_ID}" != "1" ]; then
            echo "ℹ️ ENS resolution is only available on Ethereum mainnet (chainid=1)"
            echo "Skipping ENS resolution for chain ID ${CHAIN_ID}"
            echo "ENS_NAME=${ENS_NAME_INPUT}" >> $GITHUB_ENV
            echo "ENS_RESOLVED=false" >> $GITHUB_ENV
            echo "{\"ens_name\": \"${ENS_NAME_INPUT}\", \"chain_id\": \"${CHAIN_ID}\", \"status\": \"skipped_non_mainnet\"}" > data/etherscan/ens-resolution.json
            exit 0
          fi
          
          # Check if API key is configured
          if [ -z "${ETHERSCAN_API_KEY}" ]; then
            echo "⚠️ ETHERSCAN_API_KEY not configured - skipping ENS resolution"
            echo "ENS_NAME=${ENS_NAME_INPUT}" >> $GITHUB_ENV
            echo "ENS_RESOLVED=false" >> $GITHUB_ENV
            echo "{\"ens_name\": \"${ENS_NAME_INPUT}\", \"status\": \"no_api_key\"}" > data/etherscan/ens-resolution.json
            exit 0
          fi
          
          # Use Etherscan API to resolve ENS name (only works on mainnet)
          echo "Attempting ENS resolution via Etherscan API V2..."
          
          # Use Etherscan's ENS lookup API V2 with error handling
          # Note: ENS resolution only works on Ethereum mainnet (chainid=1)
          ENS_LOOKUP_URL="https://api.etherscan.io/v2/api?chainid=1&module=ens&action=getaddress&name=${ENS_NAME_INPUT}&apikey=${ETHERSCAN_API_KEY}"
          
          # Fetch with error handling
          if ! API_RESPONSE=$(curl -s -f "${ENS_LOOKUP_URL}"); then
            echo "⚠️ Failed to connect to Etherscan API"
            echo "ENS_NAME=${ENS_NAME_INPUT}" >> $GITHUB_ENV
            echo "ENS_RESOLVED=false" >> $GITHUB_ENV
            echo "{\"ens_name\": \"${ENS_NAME_INPUT}\", \"status\": \"api_error\"}" > data/etherscan/ens-resolution.json
            exit 0
          fi
          
          # Extract address with error handling
          RESOLVED_ADDRESS=$(echo "$API_RESPONSE" | jq -r '.result // empty' 2>/dev/null || echo "")
          
          # Check if we got a valid address (simplified condition)
          if [ -n "$RESOLVED_ADDRESS" ] && [ "$RESOLVED_ADDRESS" != "null" ]; then
            echo "✓ ENS name resolved successfully"
            echo "ENS_NAME=${ENS_NAME_INPUT}" >> $GITHUB_ENV
            echo "RESOLVED_ADDRESS=${RESOLVED_ADDRESS}" >> $GITHUB_ENV
            echo "ENS_RESOLVED=true" >> $GITHUB_ENV
            echo "{\"ens_name\": \"${ENS_NAME_INPUT}\", \"resolved_address\": \"${RESOLVED_ADDRESS}\", \"status\": \"success\"}" > data/etherscan/ens-resolution.json
            echo "  ${ENS_NAME_INPUT} -> ${RESOLVED_ADDRESS}"
          else
            echo "⚠️ Could not resolve ENS name via API"
            echo "ENS_NAME=${ENS_NAME_INPUT}" >> $GITHUB_ENV
            echo "ENS_RESOLVED=false" >> $GITHUB_ENV
            echo "{\"ens_name\": \"${ENS_NAME_INPUT}\", \"status\": \"resolution_failed\"}" > data/etherscan/ens-resolution.json
          fi

      - name: Fetch Etherscan API data
        env:
          ENS_NAME_INPUT: ${{ github.event.inputs.ens_name || 'kushmanmb.eth' }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ENS_RESOLVED: ${{ env.ENS_RESOLVED }}
          RESOLVED_ADDRESS: ${{ env.RESOLVED_ADDRESS }}
          API_ENDPOINT_INPUT: ${{ github.event.inputs.api_endpoint || 'account' }}
          CHAIN_ID: ${{ env.CHAIN_ID }}
          CONTRACT_ADDRESS: ${{ github.event.inputs.contract_address }}
          IMPLEMENTATION_ADDRESS: ${{ github.event.inputs.implementation_address }}
        run: |
          echo "Fetching data from Etherscan API for ${ENS_NAME_INPUT}..."
          echo "Chain ID: ${CHAIN_ID}"
          mkdir -p data/etherscan

          # Check if API key is configured
          if [ -z "${ETHERSCAN_API_KEY}" ]; then
            echo "⚠️ ETHERSCAN_API_KEY not configured"
            repo_url="https://github.com/${GITHUB_REPOSITORY}"
            echo "Configure at: ${repo_url}/settings/secrets/actions"
            if [ "${CHAIN_ID}" = "8453" ]; then
              echo "Get API key: https://basescan.org/myapikey"
            else
              echo "Get API key: https://etherscan.io/myapikey"
            fi
            echo '{"status":"0","message":"API key not configured"}' > data/etherscan/latest.json
            exit 1
          fi
          
          # Determine the API base URL based on chain ID
          if [ "${CHAIN_ID}" = "8453" ]; then
            # Base network
            BASE_URL="https://api.basescan.org/api"
            NETWORK_NAME="Base"
          else
            # Ethereum mainnet (default)
            BASE_URL="https://api.etherscan.io/v2/api"
            NETWORK_NAME="Ethereum"
          fi
          
          echo "Network: ${NETWORK_NAME} (Chain ID: ${CHAIN_ID})"
          
          # Use the dynamically resolved address from previous step (for non-proxy endpoints)
          ENDPOINT="${API_ENDPOINT_INPUT}"
          
          # For eth_blockNumber endpoint, no address is needed
          if [ "${ENDPOINT}" = "eth_blockNumber" ]; then
            echo "eth_blockNumber endpoint does not require an address"
            TARGET_ADDRESS=""
          # For verify_proxy endpoint, use the provided contract address
          elif [ "${ENDPOINT}" = "verify_proxy" ]; then
            if [ -z "${CONTRACT_ADDRESS}" ]; then
              echo "❌ ERROR: contract_address is required for verify_proxy endpoint"
              echo '{"status":"0","message":"contract_address parameter is required"}' > data/etherscan/latest.json
              exit 1
            fi
            TARGET_ADDRESS="${CONTRACT_ADDRESS}"
            echo "Using provided contract address: ${TARGET_ADDRESS}"
          else
            # For other endpoints, use ENS resolved address
            if [ "${ENS_RESOLVED}" = "true" ] && [ -n "${RESOLVED_ADDRESS}" ]; then
              # Use the resolved address from ENS resolution
              TARGET_ADDRESS="${RESOLVED_ADDRESS}"
              echo "Using dynamically resolved address: ${TARGET_ADDRESS}"
            else
              echo "❌ ERROR: ENS name could not be resolved"
              echo ""
              echo "The ENS name '${ENS_NAME_INPUT}' could not be resolved to an Ethereum address."
              echo ""
              echo "This could be because:"
              echo "  1. The ENS name is not registered"
              echo "  2. The ENS name does not have an address record set"
              echo "  3. The Etherscan API is not responding correctly"
              echo ""
              echo "Please verify the ENS name at: https://app.ens.domains/${ENS_NAME_INPUT}"
              echo ""
              # Create error data file
              echo '{"status":"0","message":"ENS resolution failed","ens_name":"'"${ENS_NAME_INPUT}"'"}' > data/etherscan/latest.json
              exit 1
            fi
          fi
          
          # Contract addresses - updated to new implementation
          RESOLVER_CONTRACT="0x6fb9e80dDd0f5DC99D7cB38b07e8b298A57bF253"
          QUERY_ADDRESS="0xe16359506c028e51f16be38986ec5746251e9724"

          # Map endpoint to appropriate action
          case "${ENDPOINT}" in
            "account")
              # Get ETH balance for ENS address
              echo "Fetching account balance for ${ENS_NAME_INPUT}..."
              MODULE="account"
              ACTION="balance"
              PARAMS="&address=${TARGET_ADDRESS}&tag=latest"
              ;;
            "transaction")
              # Get transaction list for ENS address
              echo "Fetching transactions for ${ENS_NAME}..."
              MODULE="account"
              ACTION="txlist"
              PARAMS="&address=${TARGET_ADDRESS}&startblock=0&endblock=99999999&page=1&offset=10&sort=desc"
              ;;
            "contract")
              # Get contract ABI (if ENS points to a contract)
              echo "Fetching contract ABI..."
              MODULE="contract"
              ACTION="getabi"
              PARAMS="&address=${TARGET_ADDRESS}"
              ;;
            "ens_resolve")
              # Use proxy API to resolve ENS name via eth_call
              echo "Resolving ENS name via eth_call..."
              MODULE="proxy"
              ACTION="eth_call"
              # eth_call to resolver contract
              DATA="0x70a08231000000000000000000000000${QUERY_ADDRESS#0x}"
              PARAMS="&to=${RESOLVER_CONTRACT}&data=${DATA}&tag=latest"
              ;;
            "verify_proxy")
              # Verify proxy contract - implements the curl command from problem statement
              echo "Verifying proxy contract..."
              echo "Contract Address: ${TARGET_ADDRESS}"
              if [ -n "${IMPLEMENTATION_ADDRESS}" ]; then
                echo "Expected Implementation: ${IMPLEMENTATION_ADDRESS}"
              fi
              MODULE="contract"
              ACTION="verifyproxycontract"
              PARAMS="&address=${TARGET_ADDRESS}"
              if [ -n "${IMPLEMENTATION_ADDRESS}" ]; then
                PARAMS="${PARAMS}&expectedimplementation=${IMPLEMENTATION_ADDRESS}"
              fi
              ;;
            "eth_blockNumber")
              # Get current block number via proxy module
              # Implements: curl "https://api.etherscan.io/v2/api?chainid=1&module=proxy&action=eth_blockNumber&apikey=YourApiKeyToken"
              echo "Fetching current block number..."
              MODULE="proxy"
              ACTION="eth_blockNumber"
              PARAMS=""
              ;;
            *)
              MODULE="account"
              ACTION="balance"
              PARAMS="&address=${TARGET_ADDRESS}&tag=latest"
              ;;
          esac

          echo "Querying ${NETWORK_NAME} API: ${MODULE}/${ACTION}"
          if [ "${ENDPOINT}" != "verify_proxy" ] && [ "${ENDPOINT}" != "eth_blockNumber" ]; then
            echo "Target Address: ${TARGET_ADDRESS}"
            echo "ENS Name: ${ENS_NAME}"
          elif [ "${ENDPOINT}" = "verify_proxy" ]; then
            echo "Target Address: ${TARGET_ADDRESS}"
          fi

          # Build API URL
          if [ "${CHAIN_ID}" = "8453" ]; then
            # Base network uses standard API format (no chainid in URL)
            api_url="${BASE_URL}?module=${MODULE}&action=${ACTION}${PARAMS}"
          else
            # Ethereum mainnet uses V2 API format with chainid
            api_url="${BASE_URL}?chainid=${CHAIN_ID}&module=${MODULE}&action=${ACTION}${PARAMS}"
          fi

          # Make request with API key from secret
          # For verify_proxy, use POST method as shown in problem statement
          if [ "${ENDPOINT}" = "verify_proxy" ]; then
            echo "Making POST request for proxy verification..."
            curl -X POST -s "${api_url}&apikey=${{ secrets.ETHERSCAN_API_KEY }}" \
              -o data/etherscan/latest.json || {
              echo '{"status":"0","message":"API request failed"}' \
                > data/etherscan/latest.json
            }
          else
            # Other endpoints use GET method
            curl -s "${api_url}&apikey=${{ secrets.ETHERSCAN_API_KEY }}" \
              -o data/etherscan/latest.json || {
              echo '{"status":"0","message":"API request failed"}' \
                > data/etherscan/latest.json
            }
          fi

          # Add metadata using jq for proper JSON handling
          timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq --arg ts "${timestamp}" \
             --arg ens "${ENS_NAME}" \
             --arg addr "${TARGET_ADDRESS}" \
             --arg endpoint "${ENDPOINT}" \
             --arg chain "${CHAIN_ID}" \
             --arg network "${NETWORK_NAME}" \
             '. + {timestamp: $ts, ens_name: $ens, resolved_address: $addr, endpoint: $endpoint, chain_id: $chain, network: $network}' \
             data/etherscan/latest.json \
             > data/etherscan/latest.tmp && \
            mv data/etherscan/latest.tmp data/etherscan/latest.json

          if [ "${ENDPOINT}" = "verify_proxy" ]; then
            echo "✓ Proxy verification request submitted"
          elif [ "${ENDPOINT}" = "eth_blockNumber" ]; then
            echo "✓ Block number fetched successfully"
          else
            echo "✓ Data fetched successfully for ${ENS_NAME}"
          fi
          cat data/etherscan/latest.json

      - name: Archive data with timestamp
        run: |
          # Keep historical record
          src="data/etherscan/latest.json"
          if [ -f "${src}" ]; then
            cp "${src}" "data/etherscan/data-${WORKFLOW_RUN_TIME}.json"
          fi

      - name: Commit and push changes
        env:
          API_ENDPOINT_INPUT: ${{ github.event.inputs.api_endpoint || 'account' }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/etherscan/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Etherscan API data [automated]

            - Fetched at: ${WORKFLOW_RUN_TIME}
            - Endpoint: ${API_ENDPOINT_INPUT}
            - Workflow run: ${RUN_ID}"

            git push origin "${REF_NAME}"
            echo "✓ Changes committed and pushed"
          fi

      - name: Create summary
        if: always()
        env:
          API_ENDPOINT_INPUT: ${{ github.event.inputs.api_endpoint || 'account' }}
          ENS_NAME_INPUT: ${{ github.event.inputs.ens_name || 'kushmanmb.eth' }}
          CHAIN_ID: ${{ github.event.inputs.chain_id || '1' }}
          CONTRACT_ADDRESS: ${{ github.event.inputs.contract_address }}
          IMPLEMENTATION_ADDRESS: ${{ github.event.inputs.implementation_address }}
        run: |
          summary="${GITHUB_STEP_SUMMARY}"
          echo "## Etherscan API Integration Summary" >> "${summary}"
          echo "" >> "${summary}"
          
          # Show network information
          if [ "${CHAIN_ID}" = "8453" ]; then
            echo "- **Network**: Base (Chain ID: 8453)" >> "${summary}"
          else
            echo "- **Network**: Ethereum Mainnet (Chain ID: 1)" >> "${summary}"
          fi
          
          # Show ENS name if not verify_proxy or eth_blockNumber endpoint
          if [ "${API_ENDPOINT_INPUT}" != "verify_proxy" ] && [ "${API_ENDPOINT_INPUT}" != "eth_blockNumber" ]; then
            echo "- **ENS Name**: ${ENS_NAME_INPUT}" >> "${summary}"
          fi
          
          # Show contract details for verify_proxy
          if [ "${API_ENDPOINT_INPUT}" = "verify_proxy" ]; then
            echo "- **Contract Address**: ${CONTRACT_ADDRESS}" >> "${summary}"
            if [ -n "${IMPLEMENTATION_ADDRESS}" ]; then
              echo "- **Implementation Address**: ${IMPLEMENTATION_ADDRESS}" >> "${summary}"
            fi
          fi
          
          echo "- **Timestamp**: ${WORKFLOW_RUN_TIME}" >> "${summary}"
          echo "- **Endpoint**: ${API_ENDPOINT_INPUT}" >> "${summary}"
          if [ -f data/etherscan/latest.json ]; then
            if grep -q '"status":"0"' data/etherscan/latest.json; then
              echo "- **Status**: ❌ Failed" >> "${summary}"
            else
              echo "- **Status**: ✓ Completed" >> "${summary}"
            fi
            echo "" >> "${summary}"
            echo "### Data Preview" >> "${summary}"
            echo "\`\`\`json" >> "${summary}"
            head -20 data/etherscan/latest.json >> "${summary}"
            echo "\`\`\`" >> "${summary}"
          else
            echo "- **Status**: ⚠️ No data file created" >> "${summary}"
          fi
          echo "" >> "${summary}"
          echo "### Configuration" >> "${summary}"
          echo "This workflow supports Ethereum Mainnet and Base network." >> "${summary}"
          if [ "${API_ENDPOINT_INPUT}" = "verify_proxy" ]; then
            echo "Proxy contract verification implemented as per problem statement." >> "${summary}"
          else
            echo "ENS resolution configured for the **kushmanmb.eth** domain." >> "${summary}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: etherscan-data-${{ env.WORKFLOW_RUN_TIME }}
          path: data/etherscan/
          retention-days: 30
