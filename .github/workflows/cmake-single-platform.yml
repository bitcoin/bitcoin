## 1. Database in GitHub Actions (for testing/CI)

If you need a database to run tests or seed data during your workflow, you can use GitHub Actions **service containers**. Below is an example that adds a PostgreSQL service to the `build` job of the Nuxt deployment workflow.

### Example workflow with PostgreSQL

```yaml
name: Deploy Nuxt + DB tests

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Run database migrations / seeding
      - run: npx prisma migrate deploy   # if using Prisma
      - run: npm run test                # tests that use the DB
      - run: npx nuxt build --preset github_pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy: # same as before
    # ...
```

**Environment variables** for your app (e.g., `DATABASE_URL`) can be set via the `env` context in the step that runs your app/tests.

