We'll set up a GitHub Actions workflow to deploy your Nuxt application to GitHub Pages. The example below uses the official `github_pages` preset for optimal compatibility.

### 📁 Workflow file: `.github/workflows/deploy.yml`

```yaml
name: Deploy Nuxt to GitHub Pages

on:
  push:
    branches: [main]        # Trigger on pushes to main branch
  workflow_dispatch:         # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable  # Ensures pnpm/yarn are available if needed
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci           # Clean install (use `npm install` if you prefer)
      - run: npx nuxt build --preset github_pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
```

### ⚙️ Required Nuxt configuration

In your `nuxt.config.ts` (or `.js`), set the `baseURL` to match your repository name. Also avoid underscores in the build assets directory to prevent issues with GitHub Pages' Jekyll processing.

```ts
export default defineNuxtConfig({
  app: {
    baseURL: '/your-repo-name/',   // Replace with your repository name
    buildAssetsDir: 'assets'       // Do NOT start with '_'
  }
})
```

### ✅ Prerequisites

1. **Enable GitHub Pages** with **GitHub Actions** as the source:  
   Go to your repository **Settings → Pages → Build and deployment → Source** and select **GitHub Actions**.

2. Ensure your default branch name matches the trigger (`main` in the example). Adjust if your branch is `master` or something else.

3. Commit and push the workflow file and the updated `nuxt.config`. The next push to `main` will trigger a deployment.

> If you were looking for a CMake workflow (you mentioned `cmake-single-platform.yml`), please clarify – but for Nuxt deployment to GitHub Pages, the above should work perfectly.
