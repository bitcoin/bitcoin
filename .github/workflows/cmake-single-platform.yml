### 🔥 Scenario: Static Nuxt app on GitHub Pages + Supabase (PostgreSQL) as backend

**Goal:**  
- Deploy static Nuxt site to GitHub Pages.  
- Use Supabase as the “big database” (PostgreSQL with REST API).  
- Fetch data client‑side or via Supabase client.

**Why this works:**  
- GitHub Pages serves static files.  
- Supabase provides a database and an API – no server needed.  
- You can manage schema and data through Supabase dashboard or migrations.

#### Step‑by‑step:

1. **Create a Supabase project** at [supabase.com](https://supabase.com).  
   - Get your project URL and anon/public key from **Settings → API**.

2. **Install Supabase client** in your Nuxt app:
   ```bash
   npm install @supabase/supabase-js
   ```

3. **Create a Supabase plugin** (e.g., `plugins/supabase.client.ts`):
   ```ts
   import { createClient } from '@supabase/supabase-js'

   export default defineNuxtPlugin(() => {
     const supabase = createClient(
       process.env.SUPABASE_URL,
       process.env.SUPABASE_ANON_KEY
     )
     return {
       provide: { supabase }
     }
   })
   ```

4. **Set environment variables** locally (`.env`) and in GitHub Actions (secrets).  
   For local dev:
   ```
   SUPABASE_URL=https://yourproject.supabase.co
   SUPABASE_ANON_KEY=your-anon-key
   ```
   In GitHub repo: add these as secrets (`SUPABASE_URL`, `SUPABASE_ANON_KEY`).

5. **Use Supabase in your pages/components**:
   ```vue
   <script setup>
   const { $supabase } = useNuxtApp()
   const { data: todos } = await useAsyncData('todos', async () => {
     const { data } = await $supabase.from('todos').select('*')
     return data
   })
   </script>
   ```

6. **GitHub Actions workflow** (from previous answer) – just ensure the secrets are passed if needed at build time. If you only fetch client‑side, you don't need them at build time. If you need to prerender dynamic routes with data, you would pass them to the build step.

7. **Deploy**: The workflow builds the static site and uploads to GitHub Pages. The app will talk to Supabase directly from the browser.

