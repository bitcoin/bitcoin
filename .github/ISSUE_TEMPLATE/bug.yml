name: Bug report
description: Report a reproducible technical issue in Bitcoin Core.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## Important

        This issue tracker is only for technical issues related to Bitcoin Core.

        • General bitcoin questions: https://bitcoin.stackexchange.com  
        • Security vulnerabilities: https://bitcoincore.org/en/contact/  
        • Sync issues ("stuck", checksum mismatch): please first verify hardware stability using `memtest` and monitor CPU temperature under load (e.g., `linpack`).

        Please provide complete and reproducible information. Incomplete reports may be closed.

        ----

  - type: checkboxes
    attributes:
      label: Preliminary checks
      options:
        - label: I have searched existing issues and confirmed this has not been reported.
          required: true
        - label: I am running an officially supported version of Bitcoin Core.
          required: true

  - type: dropdown
    id: network
    attributes:
      label: Network
      description: Which network are you running?
      options:
        - Mainnet
        - Testnet
        - Signet
        - Regtest
    validations:
      required: true

  - type: textarea
    id: current-behaviour
    attributes:
      label: Current behaviour
      description: Clearly describe what is happening.
      placeholder: |
        Example:
        After block 812345, node crashes with assertion failure in validation.cpp.
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: |
        Provide precise reproduction steps:
        • Configuration options (bitcoin.conf)
        • CLI arguments
        • Build flags (if compiled from source)
        • Exact commands executed
        • Whether the issue is intermittent or deterministic
    validations:
      required: true

  - type: textarea
    id: frequency
    attributes:
      label: Frequency
      description: How often does this occur?
      placeholder: |
        • Always
        • Intermittent (approx. 1 in 5 runs)
        • Only after long uptime
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Paste relevant excerpts from debug.log.

        ⚠ Warning: debug.log may contain IP addresses or other identifying information.
    validations:
      required: false

  - type: dropdown
    id: obtain-method
    attributes:
      label: How did you obtain Bitcoin Core?
      options:
        - Compiled from source
        - Pre-built binaries
        - Package manager
        - Other
    validations:
      required: true

  - type: input
    id: core-version
    attributes:
      label: Bitcoin Core version
      description: Run `bitcoind --version` or check Help > About in Bitcoin-Qt
      placeholder: e.g. v27.0 or master@abc1234
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 24.04 LTS, macOS 14.3, Windows 11
    validations:
      required: true

  - type: textarea
    id: machine-specs
    attributes:
      label: Machine specifications
      description: |
        • CPU model
        • RAM amount
        • Disk type (HDD/SSD/NVMe)
        • Pruned or full node
        • Network bandwidth
    validations:
      required: false
